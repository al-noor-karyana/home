<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Inventory Calc • Made by SARR Inc</title>
    <style>
        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --surface-light: #334155;
            --text: #F8FAFC;
            --text-secondary: #94A3B8;
            --accent: #F59E0B;
            --accent-dark: #D97706;
            --success: #10B981;
            --danger: #EF4444;
            --blue: #3B82F6;
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        input {
            -webkit-user-select: text;
            user-select: text;
            font-family: var(--font);
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #000;
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .phone-frame {
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 900px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(245,158,11,0.15);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 0;
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .header {
            padding: 16px 20px 12px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--accent);
        }
        .company-name {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #000;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            background: var(--surface);
            border-radius: 14px;
            padding: 4px 4px 4px 14px;
            border: 1px solid var(--surface-light);
        }
        .search-wrap svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
            fill: none;
            flex-shrink: 0;
        }
        .search-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 10px 8px;
            font-size: 14px;
            outline: none;
            width: 100%;
        }
        .search-wrap input::placeholder {
            color: var(--text-secondary);
        }
        .search-clear {
            background: var(--surface-light);
            border: none;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .search-clear.show {
            display: flex;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 100px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 12px 6px;
            text-align: center;
            border: 1px solid var(--surface-light);
        }
        .stat-card .val {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .stat-card .lbl {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }
        .stat-card .val.green { color: var(--success); }
        .stat-card .val.red { color: var(--danger); }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .section-title h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-title .count {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--surface-light);
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .card-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            padding-right: 8px;
        }
        .card-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: 0.15s;
        }
        .icon-btn:active { transform: scale(0.9); }
        .btn-edit { background: rgba(59,130,246,0.15); color: var(--blue); }
        .btn-del { background: rgba(239,68,68,0.15); color: var(--danger); }

        .price-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .price-item {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-sm);
            padding: 10px;
            border: 1px solid var(--surface-light);
        }
        .price-item .lbl {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .price-item .val {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .price-item .val.green { color: var(--success); }

        .meta-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 500;
            background: var(--surface-light);
            color: var(--text-secondary);
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        .empty h4 {
            font-size: 16px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .empty p {
            font-size: 12px;
        }

        .fab {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 26px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(245,158,11,0.4);
            transition: 0.2s;
            font-weight: 300;
        }
        .fab:active {
            transform: scale(0.9);
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: flex-end;
            flex-direction: column;
        }
        .modal.open {
            display: flex;
        }
        .sheet {
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 20px 18px 30px;
            max-height: 85%;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .sheet h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 18px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--surface-light);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent);
        }
        .form-row {
            display: flex;
            gap: 8px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn-full {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn-save {
            background: var(--accent);
            color: #000;
        }
        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--surface-light);
            margin-top: 8px;
        }

        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: var(--success);
            color: #000;
        }
        .toast.error {
            background: var(--danger);
        }

        .footer-brand {
            text-align: center;
            padding: 10px 8px;
            font-size: 10px;
            color: var(--text-secondary);
            flex-shrink: 0;
            border-top: 1px solid var(--surface-light);
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        .footer-brand strong {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="status-bar">
        <span>9:41</span>
        <div class="status-right">
            <span class="status-dot"></span>
            <span>100%</span>
        </div>
    </div>

    <div class="header">
        <div class="header-top">
            <div class="logo">Inventory<span>Calc</span></div>
            <div class="avatar">SI</div>
        </div>
        <div class="company-name">Made by SARR Inc</div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search inventory..." autocomplete="off">
            <button class="search-clear" id="clearSearch">&#10005;</button>
        </div>
    </div>

    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="val" id="totalProducts">0</div>
                <div class="lbl">Products</div>
            </div>
            <div class="stat-card">
                <div class="val" id="totalSuppliers">0</div>
                <div class="lbl">Suppliers</div>
            </div>
            <div class="stat-card">
                <div class="val" id="totalEntries">0</div>
                <div class="lbl">Entries</div>
            </div>
            <div class="stat-card">
                <div class="val" id="totalValue">Rs 0</div>
                <div class="lbl">Stock Value</div>
            </div>
        </div>

        <div class="section-title">
            <h3>Inventory List</h3>
            <span class="count" id="listCount">0 items</span>
        </div>
        <div id="productList"></div>
    </div>

    <div class="footer-brand">Made by <strong>SARR Inc</strong></div>

    <button class="fab" id="fabAdd">+</button>

    <div class="modal" id="entryModal">
        <div class="sheet" id="sheet">
            <div class="sheet-handle"></div>
            <h3 id="modalTitle">New Entry</h3>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="fProductName" placeholder="e.g. Basmati Rice" autocomplete="off">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Cost Price (Rs)</label>
                    <input type="number" id="fCostPrice" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Sale Price (Rs)</label>
                    <input type="number" id="fSalePrice" placeholder="0.00" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="fDate">
            </div>
            <div class="form-group">
                <label>Supplier</label>
                <input type="text" id="fSupplier" placeholder="e.g. ABC Traders" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Contact</label>
                <input type="text" id="fContact" placeholder="Phone or email" autocomplete="off">
            </div>
            <input type="hidden" id="fEditId">
            <button class="btn-full btn-save" id="btnSave">Save to Device</button>
            <button class="btn-full btn-cancel" id="btnCancel">Cancel</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>
</div>

<script>
(function() {
    'use strict';
    var STORAGE_KEY = 'inventory_calc_sarr_inc_db';
    var entries = [];
    var currentFilter = '';
    var toastTimer = null;

    function g(id) { return document.getElementById(id); }

    function today() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function formatDate(ds) {
        if (!ds) return '';
        var p = ds.split('-');
        return p[2] + '/' + p[1] + '/' + p[0];
    }

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function uid() {
        return 'e' + Date.now().toString(36) + Math.random().toString(36).substr(2,9);
    }

    function showToast(msg, type) {
        type = type || 'success';
        var toast = g('toast');
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        toastTimer = setTimeout(function(){ toast.className = 'toast'; }, 2000);
    }

    function loadData() {
        try {
            var d = localStorage.getItem(STORAGE_KEY);
            entries = d ? JSON.parse(d) : [];
            if (entries.length === 0) {
                var t = today();
                entries = [
                    { id: uid(), name: 'Basmati Rice', cost: 85, sale: 120, date: t, supplier: 'Golden Grains', contact: '9876543210' },
                    { id: uid(), name: 'Sunflower Oil', cost: 140, sale: 175, date: t, supplier: 'Pure Oils Co.', contact: '9988776655' },
                    { id: uid(), name: 'Green Tea', cost: 110, sale: 150, date: t, supplier: 'Herbal World', contact: '8899001122' },
                    { id: uid(), name: 'Wheat Flour', cost: 38, sale: 52, date: t, supplier: 'Agro Traders', contact: '7788990011' },
                    { id: uid(), name: 'Sugar', cost: 42, sale: 55, date: t, supplier: 'Sweet Suppliers', contact: '6677889900' }
                ];
                saveData();
            }
        } catch(e) { entries = []; }
    }

    function saveData() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
    }

    function render() {
        var f = currentFilter.toLowerCase();
        var filtered = entries.filter(function(e) {
            return !f || (e.name||'').toLowerCase().indexOf(f)!==-1 || (e.supplier||'').toLowerCase().indexOf(f)!==-1 || (e.contact||'').toLowerCase().indexOf(f)!==-1;
        });
        filtered.sort(function(a,b){
            var na=(a.name||'').toLowerCase(), nb=(b.name||'').toLowerCase();
            if(na<nb)return -1; if(na>nb)return 1;
            return new Date(b.date||0)-new Date(a.date||0);
        });
        g('listCount').textContent = filtered.length + ' items';

        var container = g('productList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty"><div class="empty-icon">&#128230;</div><h4>'+(f?'No results':'No entries')+'</h4><p>'+(f?'Try different search':'Tap + to add product')+'</p></div>';
        } else {
            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var e = filtered[i];
                html += '<div class="card">';
                html += '<div class="card-top"><div class="card-name">'+esc(e.name)+'</div>';
                html += '<div class="card-actions"><button class="icon-btn btn-edit" data-eid="'+e.id+'">&#9998;</button>';
                html += '<button class="icon-btn btn-del" data-did="'+e.id+'">&#128465;</button></div></div>';
                html += '<div class="price-row"><div class="price-item"><div class="lbl">Cost Price</div><div class="val">Rs '+Number(e.cost||0).toFixed(2)+'</div></div>';
                html += '<div class="price-item"><div class="lbl">Sale Price</div><div class="val green">Rs '+Number(e.sale||0).toFixed(2)+'</div></div></div>';
                html += '<div class="meta-row"><span class="tag">'+formatDate(e.date)+'</span>';
                if(e.supplier) html += '<span class="tag">'+esc(e.supplier)+'</span>';
                if(e.contact) html += '<span class="tag">'+esc(e.contact)+'</span>';
                html += '</div></div>';
            }
            container.innerHTML = html;

            var edits = container.querySelectorAll('[data-eid]');
            for (var j = 0; j < edits.length; j++) {
                (function(id){ edits[j].onclick=function(e){ e.preventDefault(); handleEdit(id); }; })(edits[j].getAttribute('data-eid'));
            }
            var dels = container.querySelectorAll('[data-did]');
            for (var k = 0; k < dels.length; k++) {
                (function(id){ dels[k].onclick=function(e){ e.preventDefault(); handleDelete(id); }; })(dels[k].getAttribute('data-did'));
            }
        }

        var up={}, us={}, totalStock=0;
        for (var n=0; n<entries.length; n++) {
            if(entries[n].name) up[entries[n].name]=true;
            if(entries[n].supplier) us[entries[n].supplier]=true;
            totalStock += (entries[n].sale||0);
        }
        g('totalProducts').textContent = Object.keys(up).length;
        g('totalSuppliers').textContent = Object.keys(us).length;
        g('totalEntries').textContent = entries.length;
        g('totalValue').textContent = 'Rs ' + totalStock.toFixed(0);
    }

    function handleEdit(id) {
        for (var i=0; i<entries.length; i++) {
            if (entries[i].id === id) {
                var e = entries[i];
                g('fProductName').value = e.name||'';
                g('fCostPrice').value = e.cost||'';
                g('fSalePrice').value = e.sale||'';
                g('fDate').value = e.date||today();
                g('fSupplier').value = e.supplier||'';
                g('fContact').value = e.contact||'';
                g('fEditId').value = e.id;
                g('modalTitle').textContent = 'Edit Entry';
                g('entryModal').className = 'modal open';
                return;
            }
        }
    }

    function handleDelete(id) {
        if (confirm('Delete this entry?')) {
            entries = entries.filter(function(e){ return e.id !== id; });
            saveData();
            render();
            showToast('Entry deleted!', 'error');
        }
    }

    function handleSave() {
        var name = g('fProductName').value.trim();
        var cost = parseFloat(g('fCostPrice').value);
        var sale = parseFloat(g('fSalePrice').value);
        var date = g('fDate').value;
        var supplier = g('fSupplier').value.trim();
        var contact = g('fContact').value.trim();
        var editId = g('fEditId').value;

        if (!name) { showToast('Enter product name', 'error'); return; }
        if (isNaN(cost)||cost<0) { showToast('Valid cost required', 'error'); return; }
        if (isNaN(sale)||sale<0) { showToast('Valid sale required', 'error'); return; }
        if (!date) { showToast('Select date', 'error'); return; }

        if (editId) {
            for (var i=0; i<entries.length; i++) {
                if (entries[i].id === editId) {
                    entries[i].name=name; entries[i].cost=cost; entries[i].sale=sale;
                    entries[i].date=date; entries[i].supplier=supplier; entries[i].contact=contact;
                    break;
                }
            }
        } else {
            entries.push({ id:uid(), name:name, cost:cost, sale:sale, date:date, supplier:supplier, contact:contact });
        }
        saveData();
        render();
        closeModal();
        showToast(editId?'Entry updated!':'Entry added!');
    }

    function closeModal() {
        g('entryModal').className = 'modal';
        g('fProductName').value='';
        g('fCostPrice').value='';
        g('fSalePrice').value='';
        g('fDate').value=today();
        g('fSupplier').value='';
        g('fContact').value='';
        g('fEditId').value='';
        g('modalTitle').textContent='New Entry';
    }

    g('fabAdd').onclick = function(){ closeModal(); g('entryModal').className='modal open'; };
    g('btnSave').onclick = handleSave;
    g('btnCancel').onclick = closeModal;
    g('entryModal').onclick = function(e){ if(e.target===g('entryModal')) closeModal(); };

    g('searchInput').oninput = function(){
        currentFilter = this.value;
        g('clearSearch').className = currentFilter ? 'search-clear show' : 'search-clear';
        render();
    };
    g('clearSearch').onclick = function(){
        g('searchInput').value='';
        currentFilter='';
        g('clearSearch').className='search-clear';
        render();
    };

    g('fDate').value = today();
    loadData();
    render();
})();
</script>
</body>
</html>
